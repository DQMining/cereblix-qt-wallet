name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Install vcpkg libsodium
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe install libsodium:x64-windows

      - name: Configure and build
        shell: pwsh
        run: |
          cd qt-wallet
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake
          cmake --build build --config Release

      - name: Package Windows release
        shell: pwsh
        run: |
          $qt = "${{ env.QT_ROOT_DIR }}"
          $build = "qt-wallet/build/Release"
          New-Item -ItemType Directory -Force -Path "$build/platforms","$build/tls","$build/networkinformation" | Out-Null
          Copy-Item "$qt/bin/Qt6Core.dll","$qt/bin/Qt6Gui.dll","$qt/bin/Qt6Widgets.dll","$qt/bin/Qt6Network.dll" $build -Force
          Copy-Item "qt-wallet/build/vcpkg_installed/x64-windows/bin/libsodium.dll" $build -Force
          Copy-Item "$qt/plugins/platforms/qwindows.dll" "$build/platforms/" -Force
          Copy-Item "$qt/plugins/tls/qschannelbackend.dll" "$build/tls/" -Force
          if (Test-Path "$qt/plugins/networkinformation/qnetworklistmanager.dll") {
            Copy-Item "$qt/plugins/networkinformation/qnetworklistmanager.dll" "$build/networkinformation/" -Force
          }
          powershell -File tools/fetch_cereblixd.ps1 -Platform windows -OutFile "$build/cereblixd.exe"
          powershell -File tools/package_release_windows.ps1 -SkipBuild -SkipDeploy

      - uses: actions/upload-artifact@v4
        with:
          name: cereblix-qt-wallet-windows-x64
          path: dist/cereblix-qt-wallet-windows-x64.zip

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev qt6-base-dev-tools libsodium-dev libxkbcommon-dev

      - name: Package Linux release
        run: |
          chmod +x tools/build-linux.sh tools/package_release_linux.sh tools/cereblix-qt-wallet.sh tools/fetch_cereblixd.sh
          ./tools/package_release_linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: cereblix-qt-wallet-linux-x64
          path: dist/cereblix-qt-wallet-linux-x64.tar.gz

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/cereblix-qt-wallet-windows-x64/cereblix-qt-wallet-windows-x64.zip
            artifacts/cereblix-qt-wallet-linux-x64/cereblix-qt-wallet-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
